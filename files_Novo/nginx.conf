# nginx/nginx.conf
# Nginx como gateway e balanceador de carga com failover automático.
#
# Fluxo normal:    Cliente → Nginx → Primário (8080)
# Após falha:      Cliente → Nginx → Backup   (8081)
#
# O Nginx detecta a falha via health check no /health a cada 5s.
# Quando o primário retorna 503, o tráfego é automaticamente
# redirecionado para o backup (passive failover).

events {
    worker_connections 1024;
}

http {

    # ── Upstream: define o pool de servidores backend ──────────────────────────
    upstream api_backend {
        # Política: primeiro servidor disponível (com failover)
        # O Nginx tenta o primário; se falhar, tenta o backup.

        server primario:8080 max_fails=3 fail_timeout=10s;
        server backup:8081   max_fails=3 fail_timeout=10s backup;
        #                                                   ↑
        #  "backup" = só recebe tráfego quando o primário estiver indisponível
    }

    # ── Servidor principal ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Logs com identificação do upstream usado
        log_format upstream_log '$remote_addr → $upstream_addr [$status] "$request"';
        access_log /var/log/nginx/access.log upstream_log;

        # ── Rota principal: proxy para o backend ────────────────────────────
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Headers de diagnóstico (o cliente vê qual nó respondeu)
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            add_header         X-Upstream-Node   $upstream_addr always;

            # Timeouts: deve ser maior que TIMEOUT_REPLICACAO (3s) em sync.rs
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;

            # Tenta o próximo servidor em caso de erro de conexão ou timeout
            proxy_next_upstream error timeout http_503;
        }

        # ── Health check do próprio Nginx ───────────────────────────────────
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            deny  all;
        }
    }
}
